# Single-node development config.

[node]
id = 1

[sip]
# Address advertised to public SIP clients.
public_addr = "${PUBLIC_IP:-}"
# Address advertised to upstream PBX servers on the private network.
internal_addr = "${POD_IP:-}"
# Used only when public_addr is empty/unset.
public_stun_server = "${PUBLIC_STUN_SERVER:-}"
# Used only when internal_addr is empty/unset.
internal_probe_addr = "${INTERNAL_PROBE_ADDR:-8.8.8.8:53}"
max_message_bytes = 65535

[proxy]
record_route = true
register_routing = "path"
udp_client_transaction_cache_entries = 65536
# Additional PBX/opensips-edge source networks that may send SIP requests back
# to this proxy but are not selectable upstream load-balancing targets.
upstream_source_cidrs = ["10.42.0.0/16"]
# Legacy compatibility equivalent to register_routing = "contact-rewrite".
# rewrite_register_contact = true

[proxy.socket]
reuse_port = false
workers_per_listener = 1
udp_handler_workers_per_socket = 0
udp_handler_queue_size = 4096
recv_buffer_bytes = 4194304
send_buffer_bytes = 4194304
tcp_nodelay = true

[proxy.metrics]
enabled = false
bind_addr = "127.0.0.1:9100"

[proxy.affinity]
enabled = true
key = "dialog-id"
ttl_seconds = 3600

[proxy.security]
# Public is the recommended baseline for an internet-facing UDP listener.
# Use "off" only for private lab deployments.
preset = "public"
# Upstream PBX/backend IPs are trusted automatically from proxy.upstream_groups.
# Add trusted_cidrs only for extra non-upstream packet-level trusted sources.
# trusted_cidrs = ["10.0.1.20/32"]

[proxy.security.geo]
enabled = true
cache_dir = "/var/lib/sigproxy-rs/geo"
startup_refresh = "disabled"
fail_open = true
unknown_country = "allow"
request_retries = 3
allow_partial = true

[proxy.security.geo.deny]
countries = []

[proxy.security.threat_intel]
enabled = true
cache_dir = "/var/lib/sigproxy-rs/threat"
startup_refresh = "disabled"
fail_open = true
request_retries = 3
allow_partial = true

[proxy.security.dynamic_ban]
enabled = true
ban_seconds = 3600
invalid_packets_per_minute = 30
parse_errors_per_minute = 20
sip_rate_violations_per_minute = 10

[proxy.security.flood]
enabled = true
udp_packets_per_second = 200
udp_burst = 400
tcp_packets_per_second = 200
tcp_burst = 400
tcp_syn_packets_per_second = 100
tcp_syn_burst = 200
tcp_ack_packets_per_second = 200
tcp_ack_burst = 400
icmp_packets_per_second = 50
icmp_burst = 100
block_seconds = 300

[proxy.security.sip_policy]
require_registered_invite_source = true
registered_invite_source_match = "ip"

[proxy.security.xdp]
enabled = true
interfaces = []
detach_stale = true
fail_open = true
sync_dynamic_ban = true
cidr_filter = true
geo_filter = true
threat_intel = true
ip_rate_limit = true

[[proxy.upstream_groups]]
name = "default"
mode = "round-robin"
servers = ["172.30.0.60:5060", "172.30.10.30:5060"]

[proxy.upstream_groups.health_check]
enabled = true
interval_ms = 5000
timeout_ms = 2000
success_threshold = 2
failure_threshold = 3

[proxy.upstream_groups.health_check.probe]
mode = "options"
transport = "udp"
uri = "sip:healthcheck@${POD_IP:-172.30.0.101}"
success_codes = [200, 202, 405, 481]

[[proxy.listeners]]
bind = "0.0.0.0:5060"
transport = "udp"
upstream_group = "default"

# [[proxy.listeners]]
# bind = "0.0.0.0:5060"
# transport = "tcp"
# upstream_group = "default"

[persistence]
enabled = true
path = "/var/lib/sigproxy-rs/ha/state.db"
required = false
event_retention_seconds = 3600
cleanup_interval_ms = 600000
